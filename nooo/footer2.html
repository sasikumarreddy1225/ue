<mat-toolbar
  [attr.data-aue-resource]="'urn:aemconnection:/content/srp/global/' + languageCode + '/footer/jcr:content/root/container/srp_container/footerlinks_copy'"
  data-aue-type="component" [attr.data-aue-model]="'srp/components/common/footerlinks'" data-aue-label="Footer Links" data-aue-behavior="component"
  class="footer-toolbar">
  @let footerState = footerPageState();
  <!-- <span class="footer-copyright">&copy; 2025 Stellantis</span> -->
  <div class="footer-metadata">
    <span class="footer-copyright">{{
      footerState.pageContent
      | contentFilter : LABELS.COPYRIGHT_TEXT || "© 2025 Stellantis"
      }}</span>
    <span [class]="(build_env=='prd')?'srp-build-info d-none':'srp-build-info'"
      [matTooltip]="'Version :'+ build_version      +' | Environment :'+build_env_label       +'| Build Date :'+ build_date">{{build_version}}</span>
  </div>

  <div class="footer-links" data-aue-type="container" data-aue-filter="footerLink" data-aue-prop="footerLinks">
    @for(item of footerPageState().footerComponentLinks; track $index) {
    <div
      [attr.data-aue-resource]="'urn:aemconnection:/content/srp/global/' + languageCode + '/footer/jcr:content/root/container/srp_container/footerlinks_copy/footerLinks/item' + $index"
      data-aue-type="component" [attr.data-aue-model]="'srp/components/common/footerlinks/item'"
      data-aue-label="Footer Link Item" data-aue-behavior="component">
      <span class="item">
        <srp-link title="{{ item.label }}" 
          (click)="onDocumentLinkClick($event, item.document , item.type, item.label )"
          (keydown.enter)="onDocumentLinkClick($event, item.document , item.type, item.label )">
        </srp-link>
        <!-- <span data-aue-prop="document" data-aue-type="media" data-aue-filter="dam"
          data-aue-label="Document Link" [attr.data-aue-value]="item.document" data-aue-behavior="field" 
          > </span> -->
      </span>
    </div>
    }
  </div>
</mat-toolbar>
